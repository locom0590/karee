<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <title>VR Box - Kesin Çözümlü Baş Hareketli Oyun</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* VR Bölünmüş Ekran Düzeni (Sol ve Sağ Göz) */
        .vr-eye-view {
            position: relative;
            width: 50vw;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #left-eye {
            border-right: 2px solid #111;
        }

        /* Dinamik olarak hareket edecek olan Oyun Dünyası Konteyneri */
        /* scale(0.75) ile her iki gözdeki dünyayı biraz uzaklaştırıp ekrana sığdırdık */
        .game-world {
            position: absolute;
            width: 480px;
            height: 280px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Sol Bölüm: Skor ve Referans Kare */
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 40%;
        }

        .score-board {
            font-size: 14px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }

        /* Sağ Bölüm: 4 Köşe Seçenek Grubu */
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            justify-items: center;
            align-items: center;
            width: 55%;
            height: 80%;
            transition: opacity 0.3s ease;
        }

        .hidden-options {
            opacity: 0.1;
        }

        /* Küçültülmüş Seçenek Kartları */
        .option-card {
            width: 55px;
            height: 55px;
            border: 3px solid #444;
            border-radius: 6px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
        }

        .option-card::before {
            content: ""; position: absolute; top: 0; left: 50%;
            width: 3px; height: 100%; background-color: #1a1a1a;
            transform: translateX(-50%); z-index: 1;
        }
        .option-card::after {
            content: ""; position: absolute; top: 50%; left: 0;
            width: 100%; height: 3px; background-color: #1a1a1a;
            transform: translateY(-50%); z-index: 1;
        }
        .option-card div { width: 100%; height: 100%; }

        /* Her iki gözün tam merkezindeki Sabit İmleçler (Reticle) */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            box-shadow: 0 0 8px #fff;
        }

        .reticle-ring {
            position: absolute;
            top: 50%; left: 50%;
            width: 22px; height: 22px;
            border: 2px solid transparent;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        /* Başlangıç ve Seviye Seçim Ekranı */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .level-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .lvl-btn {
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            color: white; border: none; border-radius: 10px; cursor: pointer;
        }
        #lvl1 { background-color: #2ecc71; }
        #lvl2 { background-color: #f1c40f; color: #222; }
        #lvl4 { background-color: #e74c3c; }

        .ref-canvas {
            width: 100px;
            height: 100px;
            background: #222;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="vr-eye-view" id="left-eye">
        <div class="reticle" id="reticle-l"></div>
        <div class="reticle-ring" id="ring-l"></div>
        
        <div class="game-world" id="world-left">
            <div class="left-panel">
                <div class="score-board">Skor: <span id="score-l">0</span></div>
                <canvas class="ref-canvas" id="refCanvasL" width="100" height="100"></canvas>
            </div>
            <div class="options-container" id="options-l">
                <div class="option-card" id="l-opt0"></div>
                <div class="option-card" id="l-opt1"></div>
                <div class="option-card" id="l-opt2"></div>
                <div class="option-card" id="l-opt3"></div>
            </div>
        </div>
    </div>

    <div class="vr-eye-view" id="right-eye">
        <div class="reticle" id="reticle-r"></div>
        <div class="reticle-ring" id="ring-r"></div>
        
        <div class="game-world" id="world-right">
            <div class="left-panel">
                <div class="score-board">Skor: <span id="score-r">0</span></div>
                <canvas class="ref-canvas" id="refCanvasR" width="100" height="100"></canvas>
            </div>
            <div class="options-container" id="options-r">
                <div class="option-card" id="r-opt0"></div>
                <div class="option-card" id="r-opt1"></div>
                <div class="option-card" id="r-opt2"></div>
                <div class="option-card" id="r-opt3"></div>
            </div>
        </div>
    </div>

    <div id="start-overlay">
        <h2>VR BOX Baş Hareketli Eşleştirme</h2>
        <p>Telefonu yatay olarak VR BOX'a yerleştirmeden önce seviye seçin.<br>Kafanızı doğal bir şekilde sağa-sola, yukarı-aşağı çevirerek oynayabilirsiniz.</p>
        <div class="level-buttons">
            <button class="lvl-btn" id="lvl1">SEVİYE 1 (2 Renk)</button>
            <button class="lvl-btn" id="lvl2">SEVİYE 2 (3 Renk)</button>
            <button class="lvl-btn" id="lvl4">SEVİYE 4 (5 Renk)</button>
        </div>
    </div>

    <script>
        const worldL = document.getElementById('world-left');
        const worldR = document.getElementById('world-right');
        const optContL = document.getElementById('options-l');
        const optContR = document.getElementById('options-r');
        const canvasL = document.getElementById('refCanvasL');
        const canvasR = document.getElementById('refCanvasR');
        const ctxL = canvasL.getContext('2d');
        const ctxR = canvasR.getContext('2d');
        
        const allColors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0', '#FFA500', '#800080'];
        let activeColors = [];

        let score = 0;
        let targetColors = [];
        let optionsData = [];
        let correctOptionIndex = 0;
        let isWaitingForOptions = false;

        // VR Kamera Dünyası Dinamikleri
        let worldPos = {
            currentX: 0, currentY: 0,
            targetX: 0,  targetY: 0,
            speedMultiplier: 0.4, // Kafa hareket hassasiyeti
            friction: 0.18,
            // Karelerin ekrandan tamamen kaçmaması için sınır limitleri daraltıldı
            minX: -130, maxX: 130,
            minY: -80, maxY: 80
        };

        let initialAlpha = null;
        let initialBeta = null;
        let initialGamma = null;

        let hoveredOptionIndex = -1;
        let hoverStartTime = null;
        const requiredHoverTime = 1000; 

        document.getElementById('lvl1').addEventListener('click', () => startVR(2));
        document.getElementById('lvl2').addEventListener('click', () => startVR(3));
        document.getElementById('lvl4').addEventListener('click', () => startVR(5));

        async function startVR(colorCount) {
            activeColors = allColors.slice(0, colorCount);
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') { initGame(); } 
                    else { alert('Jiroskop izni gerekli!'); }
                } catch (e) { console.error(e); }
            } else { initGame(); }
        }

        function initGame() {
            document.getElementById('start-overlay').style.display = 'none';
            window.addEventListener('deviceorientation', handleVRMovement);
            generateNewRound(true);
            requestAnimationFrame(gameLoop);
        }

        // Yenilenen Kesin Eksen Kalibrasyonu (Yatay Modda VR Box Kontrolü İçin)
        function handleVRMovement(event) {
            if (initialAlpha === null) {
                initialAlpha = event.alpha;
                initialBeta = event.beta;
                initialGamma = event.gamma;
            }

            // Yatay modda kafayı sağa sola çevirmek gamma veya beta eksenlerini tetikler.
            // Çoğu mobil tarayıcıda landscape modundayken kafa rotasyonu için en stabil formül:
            let diffX = event.beta - initialBeta; 
            let diffY = event.gamma - initialGamma;

            // Kafa hareket yönüne göre dünyayı ters yönde kusursuz kaydır
            worldPos.targetX = -diffX * worldPos.speedMultiplier * 20;
            worldPos.targetY = -diffY * worldPos.speedMultiplier * 20;

            // Güvenli alan sınırlandırması
            worldPos.targetX = Math.max(worldPos.minX, Math.min(worldPos.maxX, worldPos.targetX));
            worldPos.targetY = Math.max(worldPos.minY, Math.min(worldPos.maxY, worldPos.targetY));
        }

        function getRandomColors() {
            let rc = [];
            for(let i=0; i<4; i++) { rc.push(activeColors[Math.floor(Math.random() * activeColors.length)]); }
            return rc;
        }

        function generateNewRound(immediate = false) {
            targetColors = getRandomColors();
            correctOptionIndex = Math.floor(Math.random() * 4);
            optionsData = [];

            for (let i = 0; i < 4; i++) {
                if (i === correctOptionIndex) { optionsData.push([...targetColors]); } 
                else {
                    let wc = getRandomColors();
                    while(JSON.stringify(wc) === JSON.stringify(targetColors)) { wc = getRandomColors(); }
                    optionsData.push(wc);
                }
            }

            const sides = ['l', 'r'];
            sides.forEach(side => {
                for (let i = 0; i < 4; i++) {
                    const card = document.getElementById(`${side}-opt${i}`);
                    card.innerHTML = '';
                    card.style.borderColor = '#444';
                    optionsData[i].forEach(color => {
                        const div = document.createElement('div');
                        div.style.backgroundColor = color;
                        card.appendChild(div);
                    });
                }
            });

            drawRefCanvas(ctxL);
            drawRefCanvas(ctxR);

            hoveredOptionIndex = -1;
            hoverStartTime = null;
            resetReticleRings();

            if (immediate) {
                isWaitingForOptions = false;
                optContL.classList.remove('hidden-options');
                optContR.classList.remove('hidden-options');
            } else {
                isWaitingForOptions = true;
                optContL.classList.add('hidden-options');
                optContR.classList.add('hidden-options');
                setTimeout(() => {
                    isWaitingForOptions = false;
                    optContL.classList.remove('hidden-options');
                    optContR.classList.remove('hidden-options');
                }, 2000);
            }
        }

        function drawRefCanvas(ctx) {
            ctx.clearRect(0,0,100,100);
            const s = 100;
            ctx.fillStyle = targetColors[0]; ctx.fillRect(0, 0, s/2, s/2);
            ctx.fillStyle = targetColors[1]; ctx.fillRect(s/2, 0, s/2, s/2);
            ctx.fillStyle = targetColors[2]; ctx.fillRect(0, s/2, s/2, s/2);
            ctx.fillStyle = targetColors[3]; ctx.fillRect(s/2, s/2, s/2, s/2);
            ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(s/2,0); ctx.lineTo(s/2,s); ctx.moveTo(0,s/2); ctx.lineTo(s,s/2); ctx.stroke();
        }

        function checkVRCollision() {
            if (isWaitingForOptions) return;

            let insideAnyZone = false;
            const eyeWidth = window.innerWidth / 2;
            const eyeHeight = window.innerHeight;
            const centerX = eyeWidth / 2;
            const centerY = eyeHeight / 2;

            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`l-opt${i}`);
                const rect = card.getBoundingClientRect();

                if (centerX >= rect.left && centerX <= rect.right &&
                    centerY >= rect.top && centerY <= rect.bottom) {
                    
                    insideAnyZone = true;

                    if (hoveredOptionIndex !== i) {
                        hoveredOptionIndex = i;
                        hoverStartTime = Date.now();
                    } else {
                        let elapsed = Date.now() - hoverStartTime;
                        document.getElementById(`l-opt${i}`).style.borderColor = '#f1c40f';
                        document.getElementById(`r-opt${i}`).style.borderColor = '#f1c40f';

                        let progress = Math.min(1, elapsed / requiredHoverTime);
                        updateReticleRings(progress);

                        if (elapsed >= requiredHoverTime) { processSelection(i); }
                    }
                    break;
                }
            }

            if (!insideAnyZone) {
                if (hoveredOptionIndex !== -1) {
                    document.getElementById(`l-opt${hoveredOptionIndex}`).style.borderColor = '#444';
                    document.getElementById(`r-opt${hoveredOptionIndex}`).style.borderColor = '#444';
                }
                hoveredOptionIndex = -1;
                hoverStartTime = null;
                resetReticleRings();
            }
        }

        function updateReticleRings(progress) {
            const angle = progress * 360;
            const style = `2px solid #f1c40f`;
            document.getElementById('ring-l').style.borderTop = style;
            document.getElementById('ring-r').style.borderTop = style;
            document.getElementById('ring-l').style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
            document.getElementById('ring-r').style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
        }

        function resetReticleRings() {
            document.getElementById('ring-l').style.border = '2px solid transparent';
            document.getElementById('ring-r').style.border = '2px solid transparent';
        }

        function processSelection(selectedIndex) {
            const sides = ['l', 'r'];
            if (selectedIndex === correctOptionIndex) {
                score++;
                sides.forEach(s => document.getElementById(`${s}-opt${selectedIndex}`).style.borderColor = '#2ecc71');
            } else {
                if(score > 0) score--;
                sides.forEach(s => document.getElementById(`${s}-opt${selectedIndex}`).style.borderColor = '#e74c3c');
            }
            
            document.getElementById('score-l').innerText = score;
            document.getElementById('score-r').innerText = score;

            setTimeout(() => { generateNewRound(false); }, 300);
        }

        function gameLoop() {
            // Dünyanın pozisyonunu yumuşak bir şekilde hedefe kaydır (Interpolation)
            worldPos.currentX += (worldPos.targetX - worldPos.currentX) * worldPos.friction;
            worldPos.currentY += (worldPos.targetY - worldPos.currentY) * worldPos.friction;

            // Küçültülmüş ölçeği (scale(0.75)) kayma efektiyle birleştirerek render et
            const transformStyle = `translate(${worldPos.currentX}px, ${worldPos.currentY}px) scale(0.75)`;
            worldL.style.transform = transformStyle;
            worldR.style.transform = transformStyle;

            checkVRCollision();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
